<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualisations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/graph.css') }}" />
  </head>
  <body>
    <header>
      <h1>Visualisations</h1>
    </header>
    <main>
      <ul class="visualisation-list">
        {% for v in visualisations %}
        <li>
          <a href="{{ url_for('graph_page', source_path=v.source_path) }}">{{ v.source_path }}</a>
        </li>
        {% endfor %}
      </ul>
    </main>
  </body>
</html>
